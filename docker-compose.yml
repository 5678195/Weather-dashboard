services:
  web:
    restart: always
    build: .
    expose:
      - "5000"
    depends_on:
      - redis
    environment:
      - FLASK_ENV=development
  redis:
    restart: always
    image: redis:alpine
    expose:
      - "6379"
  prometheus:
    image: prom/prometheus
    restart: always
    expose:
      - "9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
  grafana:
    image: grafana/grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    depends_on:
      - prometheus
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - web
      - grafana
