services:
  web:
    restart: always
    build: .
    expose:
      - "5000"
    depends_on:
      - redis
    environment:
      - FLASK_ENV=development
  redis:
    restart: always
    image: redis:alpine
    expose:
      - "6379"
  prometheus:
    image: prom/prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
  grafana:
    image: grafana/grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
  node-exporter:
    image: prom/node-exporter
    restart: always
    expose:
      - "9100"
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - web
      - grafana
volumes:
  grafana_data:
  prometheus_data:
